name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install

      - run: pnpm lint

      # - run: pnpm format:check

      - run: pnpm tsc --noEmit

      - run: pnpm test

      - run: pnpm playwright test tests/e2e/screen-0.spec.ts

      - run: pnpm playwright test tests/e2e/screen-1.spec.ts

      - run: pnpm playwright test tests/e2e/screen-2.spec.ts

      - run: pnpm playwright test tests/e2e/screen-3.spec.ts

      - run: pnpm playwright test tests/e2e/screen-4.spec.ts
